name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (macos, windows, linux, android, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - windows
          - linux
          - android

jobs:
  desktop:
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platforms == 'all' ||
      github.event.inputs.platforms == 'macos' ||
      github.event.inputs.platforms == 'windows' ||
      github.event.inputs.platforms == 'linux'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            platform: macos-latest
            args: --target universal-apple-darwin
          - name: linux
            platform: ubuntu-22.04
            args: ''
          - name: windows
            platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check if this platform should run
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.platforms }}" = "all" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.platforms }}" = "${{ matrix.name }}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.should_run == 'true'

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        if: steps.check.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal target
        if: steps.check.outputs.should_run == 'true' && matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: steps.check.outputs.should_run == 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        if: steps.check.outputs.should_run == 'true'
        working-directory: client
        run: npm ci

      - name: Get version from tauri config
        if: steps.check.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch'
        id: tauri_version
        shell: bash
        run: |
          version=$(grep -o '"version": *"[^"]*"' client/src-tauri/tauri.conf.json | head -1 | grep -o '"[^"]*"$' | tr -d '"')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and release (Tauri)
        if: steps.check.outputs.should_run == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          args: ${{ matrix.args }}
          tagName: ${{ github.event_name == 'push' && 'v__VERSION__' || format('v{0}', steps.tauri_version.outputs.version) }}
          releaseName: ${{ github.event_name == 'push' && 'JediNotebook v__VERSION__' || format('JediNotebook v{0}', steps.tauri_version.outputs.version) }}
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false

  android:
    if: >-
      always() &&
      (github.event_name == 'push' ||
       github.event.inputs.platforms == 'all' ||
       github.event.inputs.platforms == 'android') &&
      (needs.desktop.result == 'success' || needs.desktop.result == 'skipped')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Android APK
        working-directory: client
        run: npx tauri android build --apk

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=JediNotebook, O=JediNotebook, C=US"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          APK_PATH="client/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          ${BUILD_TOOLS}zipalign -v 4 "$APK_PATH" app-aligned.apk
          ${BUILD_TOOLS}apksigner sign \
            --ks release.keystore \
            --ks-key-alias release \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-signed.apk \
            app-aligned.apk

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            version=$(grep -o '"version": *"[^"]*"' client/src-tauri/tauri.conf.json | head -1 | grep -o '"[^"]*"$' | tr -d '"')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK
        run: |
          cp app-signed.apk jedinotebook_${{ steps.version.outputs.version }}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: v${{ steps.version.outputs.version }}
          files: jedinotebook_${{ steps.version.outputs.version }}.apk
