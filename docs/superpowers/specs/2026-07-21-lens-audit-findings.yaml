# Software Design Lenses — project-mode review
# Target: /Users/username/Documents/GitHub/JediNotebook (client/src, shared, server/src)
# Lenses: deep-modules, information-hiding, naming, comments, obviousness
# (lens-change-integrity skipped — changeset-only)
# Totals: 6 critical, 27 major, 12 minor, 12 info

# ============================================================
lens_summary:
  lens: information-hiding
  overall: "Traced five cross-cutting design decisions: (1) the vault on-disk layout (directory/filename scheme + entity-kind registry), (2) the persisted-record envelope and soft-delete convention, (3) the settings field roster, (4) the theme palette/id registry, (5) the nav route registry. None of the five is owned by a single module — each is re-enumerated in 3-25 places, so the codebase's dominant complexity is change amplification rather than large interfaces. Genuinely well-encapsulated: YAML frontmatter framing (frontmatter.ts), filename encoding (sanitize.ts), and XP/streak/level policy (streak.ts) — each a single owner."
  findings_count_by_severity: {critical: 3, major: 7, minor: 0, info: 3}
findings:
  - lens: information-hiding
    red_flag: information-leakage
    location: "client/src/vault/serializers.ts:36,72,220,313,377,419,477,499,515,535,566; client/src/vault/vaultSync.ts:27-70 (exportAllToDisk), :219-380 (importAllFromDisk), :421+ (writeEntityToDisk switch), :645-700 (handleExternalChange chain), :772-783 (tableFromPath), :619-620 (deleteEntityFile); client/src/vault/dexieHooks.ts:6-20 (TABLE_TO_TYPE)"
    severity: critical
    confidence: high
    observation: "The vault's on-disk layout — which directory each entity kind lives in, what its filename looks like, and which Dexie table it maps back to — is encoded independently in at least six places. serializers.ts emits literal paths (activities/*.md, time-log/${date}.md, inbox.md, settings.json, pdfs/*.json) from its serialize functions, but the matching deserialize* functions take only a content string and no path, so vaultSync.ts must reconstruct the same layout three more times: importAllFromDisk hardcodes the directory names to scan, handleExternalChange re-derives entity kind from a long filePath.startsWith('activities/') / 'notes/' / 'habits/' / 'mind-maps/' / 'time-log/' / 'today/' / 'pdfs/' if-chain, and tableFromPath encodes the same prefix->table mapping a second time inside the same file (including the two projects/*/project.md and projects/*/tasks.md regexes that deleteEntityFile also knows). exportAllToDisk:36 carries yet another hardcoded directory list for mkdir, and dexieHooks.ts carries a 14-entry table->entity-type registry. Adding one entity kind, or renaming one directory, requires coordinated edits in all six; a miss produces silent one-way sync (a file written but never re-imported) rather than a compile error."
    principle: "Information Leakage (§5.2) — a design decision reflected in multiple modules; specifically back-door leakage, where serializers and vaultSync both know the file layout without either exposing it."
    recommendation: "Introduce one vaultLayout module owning a single registry keyed by entity kind — { table, dir, buildPath(entity), matchPath(path) } — and have serializers, exportAllToDisk, importAllFromDisk, writeEntityToDisk, handleExternalChange, tableFromPath and dexieHooks all derive from that one table instead of restating it."
  - lens: information-hiding
    red_flag: temporal-decomposition
    location: "client/src/vault/vaultSync.ts:27 (exportAllToDisk); client/src/vault/vaultSync.ts:167 (importAllFromDisk)"
    severity: major
    confidence: high
    observation: "exportAllToDisk and importAllFromDisk are structured by execution phase (save-everything, then load-everything) rather than by knowledge. Both walk the identical entity list in the identical order and both must independently know the vault layout, the per-entity grouping rules (time entries batched per date file, tasks folded into the owning project directory, habit entries folded into the habit file, inbox as one file), and the IDEAS_FROZEN exclusion — exportAllToDisk:68 and importAllFromDisk:231 each repeat that flag check. The pair is the classic read/write split that leaks the format into both halves."
    principle: "Temporal Decomposition (§5.3) — modules split by execution order instead of by the knowledge needed."
    recommendation: "Restructure around per-entity-kind adapters that each own export/import/pathFor for one kind, and reduce exportAllToDisk/importAllFromDisk to loops over the registry."
  - lens: information-hiding
    red_flag: information-leakage
    location: "client/src/hooks/*.ts (14 hooks, e.g. useProjectTasks.ts:31-42, useHabits.ts:105, useNotes.ts:37); client/src/stores/timerStore.ts:32-44; client/src/db/seed.ts:23,34,41,62; client/src/components/inbox/InboxView.tsx:151,231,273,304; client/src/components/taskSelection/TaskSelectionView.tsx:274; client/src/vault/vaultSync.ts:750; client/src/vault/vaultStore.ts:265"
    severity: critical
    confidence: high
    observation: "The persisted-record envelope — every row carries id: generateId(), createdAt/updatedAt as new Date().toISOString(), deletedAt: null, deviceId: getDeviceId() — is hand-assembled at ~25 sites across hooks, stores, seed, the vault layer, and two UI components. Its dual, the soft-delete convention (.filter(t => !t.deletedAt) on every read, update(id, {deletedAt: now, updatedAt: now}) on every delete), appears in essentially every hook and leaks into components (InboxView.tsx:138,218, TaskSelectionView.tsx:261,482, ProjectsView.tsx:36,40) and into timerStore.ts:94. Nothing enforces it: a query that forgets the filter silently resurrects deleted rows, and a create that forgets updatedAt silently breaks LWW sync."
    principle: "Information Leakage (§5.2) — the same design decision (record identity/versioning format, and delete semantics) is reflected in dozens of modules, causing change amplification."
    recommendation: "Add a repository layer over Dexie (e.g. newRecord<T>(fields) plus liveTable(name) / softDelete(table, id)) that stamps the envelope and applies the !deletedAt filter by construction, and route all hooks, stores and components through it."
  - lens: information-hiding
    red_flag: information-leakage
    location: "client/src/hooks/useProjectTasks.ts:104-116 (deleteTask); client/src/components/taskSelection/TaskSelectionView.tsx:478-485 and :549"
    severity: major
    confidence: high
    observation: "The cascade policy 'soft-deleting a projectTask must also soft-delete every todayTask referencing it' lives in useProjectTasks.deleteTask, which wraps it in a db.transaction('rw', [projectTasks, todayTasks], ...). TaskSelectionView.tsx:478-485 reimplements the identical cascade inline against db — same query, same two updates, but with no transaction — and a second delete path at TaskSelectionView.tsx:549 updates projectTasks.deletedAt with no cascade at all, leaving orphaned todayTasks. The referential-integrity rule is a hidden database decision that has escaped into a view component, and the two copies have already diverged."
    principle: "Information Leakage (§5.2) — a design decision reflected in more than one module, with the copies already inconsistent."
    recommendation: "Delete both inline cascades in TaskSelectionView and call useProjectTasks().deleteTask so the cascade chain exists in exactly one place."
  - lens: information-hiding
    red_flag: information-leakage
    location: "shared/constants.ts:51+ (DEFAULT_SETTINGS); client/src/stores/settingsStore.ts:76-118 (SettingsState) and :129-186 (load hydration list); shared/types.ts:28-53 (UserSettings); server/src/database.ts:52-60 (CREATE TABLE user_settings); server/src/services/syncService.ts:80-90 (INSERT/ON CONFLICT); client/src/vault/serializers.ts:496-506"
    severity: critical
    confidence: high
    observation: "The roster of settings fields is enumerated five times over. SettingsState declares ~40 fields; load() re-lists all ~40 as explicit raw.X ?? DEFAULT_SETTINGS.X assignments; DEFAULT_SETTINGS lists them again; shared/types.ts UserSettings lists a drifted subset (it lacks uiZoom, hiddenNavTabs, navTabOrder, customThemeColors, taskTimerMinutes, gamificationEnabled, currentStreak, totalXP, bottomNavTabs, mobileProjectGrid, and others); and the server restates a 9-column subset three times (CREATE TABLE, INSERT column list, and a per-column CASE WHEN excluded.updatedAt > ... block). Because db.settings is typed as EntityTable<UserSettings> (db/index.ts:6), the store already casts through raw as any. Adding a setting requires 4-6 coordinated edits, and forgetting the load() line means the value silently reverts to default on every reload — a live bug class."
    principle: "Information Leakage (§5.2) — one decision (what a user's settings consist of) reflected in five modules, with the copies already out of sync."
    recommendation: "Make one module the single owner of the settings schema — derive SettingsState, UserSettings, and defaults from one declaration, and replace the hand-written load() list with {...DEFAULT_SETTINGS, ...saved} plus explicit migration steps only for legacy fields (darkMode, 'notion')."
  - lens: information-hiding
    red_flag: information-leakage
    location: "client/src/index.css:164-193 (html.dracula and 10 sibling blocks); client/src/hooks/useThemeColors.ts:14-26 (getThemeSnapshot), :147 and the DRACULA/NORD/... palette objects; client/src/components/settings/ThemeToggle.tsx:21 (THEMES swatches); client/src/stores/settingsStore.ts:52 (classList.remove list); shared/types.ts:58-61 (ThemeMode union)"
    severity: major
    confidence: high
    observation: "Two theme decisions leak. First, the palette: Dracula's #282a36 / #f8f8f2 / #bd93f9 / #44475a are written once as CSS custom properties in index.css:164, a second time as the DRACULA literal object in useThemeColors.ts (for Recharts), and a third time as swatch hexes in ThemeToggle.tsx:21 — x11 themes. Second, the theme registry: the id list appears in the ThemeMode union, the classList.remove(...) argument list in settingsStore.applyTheme, the getThemeSnapshot() cl.contains(...) probe chain, the switch in useThemeColors, the THEMES array, and the translation keys. getThemeSnapshot additionally recovers the active theme by reading the <html> class list even though settingsStore already holds it authoritatively."
    principle: "Information Leakage (§5.2)"
    recommendation: "Define each theme once as a data object (id, label key, all 12 color tokens, shadow preset) in a single themes.ts; generate the CSS custom properties, the Recharts palette, and the ThemeToggle swatches from it, and have useThemeMode() read settingsStore.theme directly instead of sniffing the DOM class."
  - lens: information-hiding
    red_flag: information-leakage
    location: "client/src/components/layout/Sidebar.tsx:139-147; BottomNav.tsx:104-112; DesktopBottomNav.tsx:114-122; DropdownNav.tsx:137-145 and :105 (iconMap); AppShell.tsx (WIDE_PAGES/FULL_BLEED_PAGES); client/src/App.tsx (Route list)"
    severity: major
    confidence: high
    observation: "The route registry — which pages exist, their label keys, their icons, and their ordering — is restated in four nav components with near-identical nine-entry arrays, plus a separate iconMap in DropdownNav that must be kept in step with its own array, plus AppShell's layout-class lists and App.tsx's <Route> list. The SVG icon bodies themselves are duplicated in all four components at different sizes. Beyond the six-file edit cost, the copies have already drifted: BottomNav orders /today second while the other three put /tasks there, and BottomNav alone carries shortLabelKey. Nothing surfaces the drift."
    principle: "Information Leakage (§5.2) — one decision reflected in six modules, with back-door drift between the copies."
    recommendation: "Extract a single navRegistry.ts exporting { route, labelKey, shortLabelKey?, Icon, layout } per page; have all four nav components, AppShell's layout classes, and the router map over it, and delete the per-component icon copies."
  - lens: information-hiding
    red_flag: overexposure
    location: "client/src/utils/time.ts:28 (getLogicalDate), :37 (getTodayRange); callers: hooks/useTodayTasks.ts:18-19, useTimeEntries.ts:8-9,27, useTimer.ts:28,85, useTaskTimer.ts:34,90, usePomodoro.ts:60,65, useDayBoundary.ts:5,10; stores/timerStore.ts:9,22,39; utils/streak.ts:32; components/analytics/DailyView.tsx:13,17, WeeklyView.tsx:22,27, MonthlyView.tsx:21,26"
    severity: major
    confidence: high
    observation: "getLogicalDate(dayStartHour) requires every caller to supply the day-boundary setting, so ~13 modules independently reach into useSettingsStore for dayStartHour and thread it through. It propagates into signatures that have nothing to do with configuration: timerStore.start(activityId, dayStartHour) takes the parameter purely to forward it. The common case — 'what is today?' — has no default and forces every caller to know where the day-boundary policy is stored; three analytics components duplicate the same useSettingsStore + getLogicalDate + useMemo pairing verbatim."
    principle: "Overexposure (§5.7) — a commonly-used feature lacks a sensible default."
    recommendation: "Provide today() (and a reactive useLogicalDate() hook) that read dayStartHour from settingsStore internally, keeping the explicit-parameter form only for the rare caller that needs a hypothetical boundary; then drop dayStartHour from timerStore.start."
  - lens: information-hiding
    red_flag: information-leakage
    location: "client/src/stores/timerStore.ts:15-51; client/src/hooks/usePomodoro.ts:59-70, :117-120; client/src/hooks/useTaskTimer.ts:90, :106-111"
    severity: major
    confidence: high
    observation: "The arbitration rule for the shared activity timer — 'start it only if it isn't already running for my linked activity; stop it only if the running activity is mine' — is not owned by timerStore. It is spelled out as raw inspections of the store's internal fields in three places: usePomodoro.ts:64, usePomodoro.ts:119, and useTaskTimer.ts:107. Because ownership lives in the callers rather than the store, the two features cannot see each other: with a Pomodoro and a task timer bound to the same activity, whichever stops first stops the shared timer out from under the other."
    principle: "Information Leakage (§5.2) — the timer-ownership decision is reflected in three modules, and the store's internal representation is exposed so callers can restate it."
    recommendation: "Move the rule into timerStore as an owner-aware API — e.g. acquire(ownerId, activityId) / release(ownerId) with refcounting."
  - lens: information-hiding
    red_flag: information-leakage
    location: "client/src/components/inbox/InboxView.tsx:138,151-152,218,231-232,273-274,304; client/src/components/taskSelection/TaskSelectionView.tsx:261,274-275,478-485,549; client/src/components/projects/ProjectsView.tsx:36,40"
    severity: major
    confidence: high
    observation: "The hooks layer is the intended boundary over Dexie, but three view components import db directly and issue raw add/update/filter calls. In doing so they take on knowledge that belongs behind that boundary: table names and index shapes, the !deletedAt filter, the full record envelope (InboxView.tsx:151-152 and TaskSelectionView.tsx:274-275 both hand-build deletedAt: null, deviceId: getDeviceId()), the cascade chain, and the XP-award convention — which these paths simply omit, so tasks created from TaskSelectionView award no XP while the same action through useProjectTasks.createTask does."
    principle: "Information Leakage (§5.2)"
    recommendation: "Route these three components through the existing hooks (useInbox, useProjectTasks, useAllProjectTasks), extending those hooks with any missing operation, so db is imported only by hooks, stores, seed, and the vault layer."
  - lens: information-hiding
    red_flag: none
    location: "client/src/vault/frontmatter.ts"
    severity: info
    confidence: high
    observation: "The YAML-frontmatter framing decision — the --- delimiter, where the block ends, how the body is trimmed, the yaml stringify options, and the choice to degrade to an empty meta object on a parse error — is entirely contained in this one 45-line module behind parseFrontmatter/stringifyFrontmatter. No other module references FM_DELIMITER or imports the yaml package."
    principle: "Information Hiding (§5.1)"
    recommendation: "—"
  - lens: information-hiding
    red_flag: none
    location: "client/src/utils/streak.ts"
    severity: info
    confidence: high
    observation: "The gamification policy is cleanly owned: XP amounts (XP_VALUES), the streak-continuation rule, the daily-XP reset, the quadratic level formula, and the promise-chain serialization that prevents read-modify-write races are all in one module. The eight call sites only say awardXP(XP_VALUES.completeTask) — they know a name, not the amount."
    principle: "Information Hiding (§5.1)"
    recommendation: "—"
  - lens: information-hiding
    red_flag: none
    location: "client/src/vault/sanitize.ts"
    severity: info
    confidence: high
    observation: "The filename-encoding decision is well contained: the unsafe-character set, the 60-char truncation, the 6-hex-digit short id, the 'Name (019abc).md' shape, and the regex that reads that shape back are all in one 33-line module, with entityFilename and extractShortIdFromFilename as inverse operations side by side. The counterexample that shows the vault directory layout could be contained the same way."
    principle: "Information Hiding (§5.1)"
