# ============================================================
lens_summary:
  lens: deep-modules
  overall: "The codebase's depth profile is bimodal. A handful of genuinely deep modules exist — utils/taskDnd.ts, vault/vaultSync.ts, hooks/useBackspaceGuard.ts — where a two-to-five-name interface hides real complexity. But the two layers that every feature passes through are the shallowest: the 12-hook Dexie CRUD family (textbook classitis) and settingsStore, whose 40-plus-field flat SettingsState is its representation and is read field-by-field by roughly 40 components. React props are a second hotspot: the drag protocol and the task-timer state machine are passed prop-by-prop rather than hidden."
  findings_count_by_severity: {critical: 1, major: 6, minor: 6, info: 3}
findings:
  - lens: deep-modules
    red_flag: shallow-module
    location: "client/src/stores/settingsStore.ts:75 (SettingsState) and :118 (update)"
    severity: critical
    confidence: high
    observation: "SettingsState declares 41 flat public fields and the only mutator is update: (patch: Partial<Omit<SettingsState, 'loaded'|'load'|'update'|'addRecentVault'>>). The interface is the representation: consumers select raw fields all over the component tree, and any field can be written by anyone. load() is ~45 lines of hand-written raw.x ?? DEFAULT_SETTINGS.x, one line per field — a second copy of the field list. The project's own CLAUDE.md documents adding one setting as a five-file pipeline; that checklist is the change-amplification symptom of this shape. update() also carries three hidden side effects (applyTheme, applyAccentColor, applyZoom)."
    principle: "Shallow Module (§4.5) — the interface exposes the internal representation; Interface = formal + informal (§4.2)"
    recommendation: "Split the god-store into cohesive sub-modules with intention-revealing operations instead of field access — a theme module behind setTheme()/isDark(), a navLayout module behind hideTab()/reorderTabs(), a gamification module. Replace the per-field ?? ladder in load() with a single {...DEFAULT_SETTINGS, ...raw} merge plus explicit migrations."
  - lens: deep-modules
    red_flag: shallow-module
    location: "design-level: client/src/hooks/{useActivities,useNotes,useInbox,useFolders,useProjects,useMindMaps,usePdfDocuments,usePomodoroPresets,useTimeEntries,useProjectTasks,useTodayTasks,useHabits}.ts"
    severity: major
    confidence: high
    observation: "Twelve hooks each publish their own createX/updateX/deleteX interface over a nearly identical body. useActivities.ts:35 is representative; useNotes.updateNote, useInbox.updateItem, useProjects.updateProject, useFolders.updateFolder are the same five lines with the table and the Pick<> list swapped. Documentation for any one would be as long as its body, and the Partial<Pick<Entity,...>> parameter type means the caller must know the entity's field names anyway. The shared conventions — soft delete, ISO timestamps, deviceId, sortOrder = all.length, awardXP — are re-typed in each one rather than owned anywhere, which is why useFolders.createFolder picks a random colour while useActivities.createActivity uses getNextColor."
    principle: "Shallow Module — classitis (§4.5-4.6)"
    recommendation: "Introduce one deep useEntity<T>(table) (or a non-React repository(table) module) owning id generation, timestamps, deviceId, soft delete and XP awarding; let each hook keep only what is genuinely entity-specific."
  - lens: deep-modules
    red_flag: shallow-module
    location: "client/src/vault/serializers.ts (24 exported functions)"
    severity: major
    confidence: high
    observation: "The module's interface is 24 exported functions in five mutually incompatible return shapes: most return {path, content}; serializeProject(p, tasks) returns Map<string,string>; deserializeHabit returns {habit, entries}; deserializeTimeLog returns {entries}; deserializeTodayTasks returns {tasks}; pdfBinaryPath returns a bare string. Arities differ too. The single consumer, vaultSync.ts, therefore cannot loop over entities — it hand-writes a distinct branch per type in exportAllToDisk, writeEntityToDisk and handleExternalChange, i.e. the same 14-way fan-out three times."
    principle: "Shallow Module (§4.5); a simple interface matters more than a simple implementation (§4.8)"
    recommendation: "Give every entity one uniform serializer shape — interface EntitySerializer<T> { toFiles(entity, children): VaultFile[]; fromFiles(files): {entity: T; children: unknown[]} } — and register them in one table keyed by entity type."
  - lens: deep-modules
    red_flag: shallow-module
    location: "client/src/vault/serializers.ts:156 (deserializeProject)"
    severity: major
    confidence: high
    observation: "deserializeProject(projectContent): Omit<Project,'deletedAt'> returns a Project whose name is deliberately empty — name: '', // Filled by caller from directory name. The declared return type promises a complete Project; the real contract is 'a Project minus its name'. Every caller must then know the filename encoding, and vaultSync.ts open-codes it twice even though sanitize.ts already owns the encoding via entityFilename()."
    principle: "Interface = formal + informal (§4.2); Shallow Module (§4.5)"
    recommendation: "Change the signature to deserializeProject(dirName: string, projectContent: string) and decode the name inside, next to entityFilename()'s inverse in sanitize.ts."
  - lens: deep-modules
    red_flag: shallow-module
    location: "client/src/vault/platform.ts:27,65,73"
    severity: major
    confidence: high
    observation: "Five exported ways to ask one question — isTauri(), isMobileTauri(), isAndroidTauri(), detectAndroidOnce(), useIsAndroid() — over a module whose whole implementation is a UA regex and one plugin probe. The cost is the call-ordering rule behind them: detectAndroidOnce's doc says 'Call once at startup ... so subsequent isAndroidTauri() calls are reliable and synchronous', and isAndroidTauri() at :65 silently degrades to /Android/i.test(navigator.userAgent) when the cache is cold — the very sniff the module documents as unreliable. A caller cannot tell from the signature whether it is getting a real answer or the known-wrong fallback."
    principle: "Interface = formal + informal; usage rules are part of the interface (§4.2)"
    recommendation: "Collapse to one honest interface: an async getPlatform(): Promise<Platform> memoised internally, plus usePlatform() for components; delete the synchronous-but-maybe-wrong isAndroidTauri(), or have it throw/return 'unknown' when the probe has not resolved."
  - lens: deep-modules
    red_flag: shallow-module
    location: "client/src/components/today/TodayTaskCard.tsx:10 (TodayTaskCardProps)"
    severity: major
    confidence: high
    observation: "14 props, 8 of which are the task-timer state machine relayed field by field: isTaskActive, countdownDisplay, countdownComplete, isPaused, onStartTask, onStopTask, onPauseTask, onResumeTask — a near-verbatim copy of what useTaskTimer() already returns. The card's own job is small next to the interface a caller must satisfy, and TodayPage exists partly to shuttle those eight values across. Adding one timer concept widens the card's interface, its parent's wiring, and the hook."
    principle: "Shallow Module (§4.5); the common case should be simple (§4.7)"
    recommendation: "Have TodayTaskCard call useTaskTimer() itself and derive its own state from activeTaskId === task.id, dropping all eight props; or accept one timer: TaskTimerView object."
  - lens: deep-modules
    red_flag: shallow-module
    location: "design-level: components/projects/TaskItem.tsx:12, taskSelection/SelectableTaskRow.tsx:10, taskSelection/TaskGroupCard.tsx:10"
    severity: major
    confidence: high
    observation: "The same five-prop drag protocol is re-declared verbatim in three row components — draggable?, onDragStart?, onDragOver?, onDrop?, isDragOver?: 'above'|'below'|null (TaskGroupCard spells it onProjectDragStart/isProjectDragOver for the same thing). None of the three hides any reordering logic: the above/below hit-test, the index computation and the persistence all live in each parent. The rows carry the full cost of the protocol in their interfaces while providing none of its functionality."
    principle: "Shallow Module (§4.5); classitis (§4.6)"
    recommendation: "Extract one reorder module — a useReorderList({items, onReorder}) hook returning per-item handler bundles, or a <Reorderable> wrapper — that owns the hit-test and index math."
  - lens: deep-modules
