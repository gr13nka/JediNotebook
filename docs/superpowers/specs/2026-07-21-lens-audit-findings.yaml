lens_summary:
  lens: obviousness
  overall: "Sampled the highest-traffic hidden-behavior surfaces: data hooks and stores that award XP or cascade-delete, the two sync systems' entry points, workers and their hook wrappers, theming, date/streak utilities, drag-and-drop, and one large component. Most of this code is well-commented at the point of difficulty (taskDnd.ts, pollingWatcher.ts). The real obscurity is cross-file: a documented app-wide invariant (route all 'today' math through getLogicalDate) is silently broken in the Habits feature, and two unrelated mechanisms independently spawn recurring-task instances with no cross-reference between them."
  findings_count_by_severity: {critical: 1, major: 4, minor: 0, info: 1}
findings:
  - lens: obviousness
    red_flag: nonobvious-code
    location: "client/src/hooks/useHabits.ts:8-24 (getWeekDates, getToday), :45-68 (computeStreak)"
    severity: critical
    confidence: high
    observation: "Every other date-sensitive feature (timerStore.ts:39, streak.ts:32, useTodayTasks.ts:19, useTimeEntries.ts:9/27, analytics Daily/Weekly/MonthlyView) computes 'today' via getLogicalDate(dayStartHour), which respects the app's configurable day boundary (a day can run 6am-2am). useHabits.ts's getToday() and getWeekDates() instead use raw new Date().toISOString().slice(0,10), and computeStreak() walks backward from a fresh new Date(). For any user with a non-midnight day boundary, habit 'today' checkboxes, the weekly tracker grid, and streak counts silently disagree with every other date-driven feature (e.g. at 1am with dayStartHour=6, Habits already shows the next calendar day while Timer/Analytics still show the previous logical day)."
    principle: "Nonobvious Code — behavior that violates a convention the reader will assume (§18.2)"
    recommendation: "Route useHabits.ts's today/week/streak calculations through getLogicalDate(dayStartHour) like the rest of the app, or if habits are deliberately calendar-day-based, say so in a comment at getToday()."
  - lens: obviousness
    red_flag: nonobvious-code
    location: "client/src/hooks/useAnalytics.ts:115"
    severity: major
    confidence: high
    observation: "Same root cause: the per-activity streak calculation computes const today = new Date().toISOString().split('T')[0] (plain calendar date) and walks it backward day-by-day, but compares against e.date values in timeEntries, which are stored as logical dates via getLogicalDate() (timerStore.ts:39). Near a day-boundary crossing, a streak that is actually intact can read as broken (or vice versa)."
    principle: "Nonobvious Code — violates the codebase's logical-date convention (§18.2)"
    recommendation: "Use getLogicalDate(dayStartHour) here too, matching every other consumer of the date field on timeEntries."
  - lens: obviousness
    red_flag: nonobvious-code
    location: "client/src/stores/timerStore.ts:72"
    severity: major
    confidence: high
    observation: "stop: async () => { ...db.timeEntries.update(...); if (durationSeconds >= 60) awardXP(XP_VALUES.stopTimer); set({...}) } — a timer-lifecycle store action (whose interface is start/stop/tick/restore) reaches out and mutates unrelated gamification/streak state in settingsStore as an uncommented side effect. A reader calling timerStore.getState().stop() from usePomodoro.ts or useTaskTimer.ts to silence a linked activity timer would not expect that call to also silently add XP and touch the daily streak."
    principle: "Nonobvious Code — hidden side effect / violates reader expectations of a lifecycle method (§18.2)"
    recommendation: "Either move the XP award out to the call sites that represent a deliberate 'stop', or add a one-line comment at the awardXP call explaining the coupling."
  - lens: obviousness
    red_flag: nonobvious-code
    location: "client/src/hooks/useHabits.ts:184-190 (deleteHabit)"
    severity: major
    confidence: high
    observation: "deleteHabit() is a bare db.habits.update(id, { deletedAt, updatedAt }) with no cascade. Contrast with sibling hooks: useProjects.deleteProject() (useProjects.ts:57-76) cascades into projectTasks and todayTasks inside a transaction, and useProjectTasks.deleteTask() (useProjectTasks.ts:106-120) cascades into todayTasks. A reader who has just read either expects the same cascade for habitEntries — it silently isn't there, and habitEntries for a deleted habit are orphaned."
    principle: "Nonobvious Code — violates the cascade-soft-delete convention established by sibling hooks (§18.2)"
    recommendation: "Cascade-delete habitEntries for consistency, or add a comment at deleteHabit stating the omission is deliberate."
  - lens: obviousness
    red_flag: nonobvious-code
    location: "client/src/hooks/useProjectTasks.ts:66-96 (toggleTask) and client/src/hooks/useRecurringTaskCheck.ts (mounted at client/src/App.tsx:49)"
    severity: major
    confidence: high
    observation: "Reading toggleTask() alone, the obvious conclusion is that recurrence is entirely driven by completing a task: on completion, if task.recurrenceRule is set, it unconditionally creates the next occurrence right away (gated only by a title-dedup check, not by the recurrence interval). Nothing hints that a second, independent mechanism exists: useRecurringTaskCheck is mounted once at the app root and, on mount plus every visibilitychange to visible, re-scans all completed recurring tasks app-wide and creates further occurrences gated by shouldCreateRecurrence()'s interval math (recurrence.ts:22-26) — real 'wait N days' semantics that toggleTask's inline copy does not apply."
    principle: "Nonobvious Code — control flow that cannot be followed locally from the obvious call site (§18.2)"
    recommendation: "Have toggleTask's inline recurrence-creation call the same shouldCreateRecurrence()-gated path useRecurringTaskCheck uses (single source of truth), or at minimum cross-comment both functions."
  - lens: obviousness
    red_flag: none
    location: "client/src/utils/taskDnd.ts:41-56 (setTaskPayload)"
    severity: info
    confidence: high
    observation: "Exactly the kind of interaction where a first guess would likely be wrong (effectAllowed differs between setTextPayload 'copy' and setTaskPayload 'copyMove', and a dropEffect incompatible with effectAllowed silently kills the drop with no error) — but a doc comment on the function explains why 'copyMove' is required here specifically and why it's safe. The obvious-but-wrong reading is preempted by the comment."
    principle: "Obvious/well-documented despite an inherently tricky browser API (§18.2)"
    recommendation: "—"

