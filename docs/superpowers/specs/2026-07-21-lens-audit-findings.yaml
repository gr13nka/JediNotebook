    location: "client/src/vault/writeQueue.ts:62 (WriteQueue.getCoalesceKey)"
    severity: minor
    confidence: high
    observation: "A seven-line comment over a one-line body returning `${entityType}:${entityId}`, documented as coalescing by parent key to avoid N writes for N child changes — followed by an admission that it does not do that. The method name and its documentation both promise an abstraction the body does not provide, and the class-level doc inherits the same false promise: reordering N tasks still enqueues N distinct keys and N writes."
