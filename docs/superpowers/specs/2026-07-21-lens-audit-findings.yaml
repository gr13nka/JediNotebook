  overall: "The core data-layer vocabulary (Activity, ProjectTask, TodayTask, TimeEntry, Habit, etc.) is comprehensive and used consistently everywhere it originates. Naming weakens at boundaries: where a second similarly-shaped mechanic was added near an existing one without reusing its vocabulary (a 'points' staleness penalty next to the real XP reward system; a bare tasks field meaning different things in two sibling hooks; an unqualified taskId that actually holds a TodayTask id), and where a feature crosses a serialization/UI boundary and picks up a new name for an existing domain type (vault's 'TimeLog' for TimeEntry; the nav's 'Ideas' for Note/notes)."
