<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1A1E" />
    <title>Time Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"><p style="padding:40px;font-family:sans-serif;font-size:18px">Loading...</p></div>
    <script>
      function showErr(e) {
        var r = document.getElementById('root');
        var msg = (e && e.message) || String(e);
        var stack = (e && e.stack) || '';
        r.innerHTML = '<pre style="padding:40px;color:red;font-size:13px;white-space:pre-wrap">' +
          msg + '\n\n' + stack + '</pre>';
      }
      window.onerror = function(msg, src, line, col, err) { showErr(err || msg); };
      window.onunhandledrejection = function(ev) { showErr(ev.reason); };
    </script>
    <script type="module">
      import("/src/main.tsx").catch(function(err) {
        document.getElementById('root').innerHTML =
          '<pre style="padding:40px;color:red;font-size:13px;white-space:pre-wrap">' +
          err.message + '\n\n' + err.stack + '</pre>';
      });
    </script>
  </body>
</html>
